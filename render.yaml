services:
  - type: web
    name: emir-hub-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: MARSIT_PHONE
        sync: false
      - key: MARSIT_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: emir_hub
      - key: DEBUG
        value: false
      - key: SCREENSHOT_ON_ERROR
        value: false
      - key: TIMEZONE
        value: Asia/Tashkent
      - key: CHECK_TIME_MORNING
        value: "09:00"
      - key: CHECK_TIME_EVENING
        value: "23:00"
